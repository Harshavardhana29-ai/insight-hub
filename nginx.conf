server {
    listen       80;
    server_name  _;
 
    root   /usr/share/nginx/html;
    index  index.html;
 
    location / {
        try_files $uri $uri/ /index.html;
    }
 
    # AI Maturity sub-app — SPA fallback (temporary — remove to decouple)
    location /ai-maturity {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
 